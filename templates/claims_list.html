{% extends "base.html" %}
{% block title %}All Claims — Insurance Claim Assessment{% endblock %}
{% block content %}

<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem;">
    <div>
        <h1 style="font-size: 24px; font-weight: 700;">All Claims</h1>
        <p style="color: #718096; margin-top: 4px; font-size: 14px;" id="claims-count">Loading...</p>
    </div>
    <a href="/submit" class="btn btn-primary">+ Submit New Claim</a>
</div>

<div class="card">
    <table>
        <thead>
            <tr>
                <th>Claim #</th>
                <th>Customer</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Approved</th>
                <th>Fraud Score</th>
                <th>Compliance</th>
                <th>Status</th>
                <th>Assessed</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="claims-tbody">
            <tr><td colspan="10" style="text-align: center; color: #718096; padding: 3rem;">Loading claims...</td></tr>
        </tbody>
    </table>
</div>

<script>
function getStatusBadge(status) {
    const map = {approved: 'badge-approved', rejected: 'badge-rejected', fraud_suspected: 'badge-fraud', under_review: 'badge-review', submitted: 'badge-submitted', assessing: 'badge-pending', validating: 'badge-pending'};
    return `<span class="badge ${map[status] || 'badge-submitted'}">${status.replace(/_/g,' ')}</span>`;
}
function scoreBar(val, reverse=false) {
    const pct = Math.round(val * 100);
    const cls = reverse ? (pct > 70 ? 'score-bad' : pct > 40 ? 'score-medium' : 'score-good') : (pct > 70 ? 'score-good' : pct > 40 ? 'score-medium' : 'score-bad');
    return `<div style="font-size: 12px; color: #a0aec0;">${(val).toFixed(3)}</div><div class="score-bar" style="width:80px"><div class="score-fill ${cls}" style="width:${pct}%"></div></div>`;
}

async function loadClaims() {
    const res = await fetch('/api/claims?limit=50');
    const data = await res.json();
    document.getElementById('claims-count').textContent = `${data.count} claim${data.count !== 1 ? 's' : ''}`;
    const tbody = document.getElementById('claims-tbody');
    if (!data.claims.length) {
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; color:#718096; padding:3rem;">No claims found. <a href="/submit" style="color:#667eea">Submit your first claim</a></td></tr>';
        return;
    }
    tbody.innerHTML = data.claims.map(c => `
        <tr>
            <td style="font-family:monospace; color:#7f9cf5; font-size:12px;">${c.claim_number}</td>
            <td>${c.customer_name}</td>
            <td><span class="badge badge-submitted">${c.claim_type}</span></td>
            <td style="color:#e2e8f0; font-size:13px;">$${c.claim_amount.toLocaleString()}</td>
            <td style="color: ${c.approved_amount > 0 ? '#68d391' : '#718096'}; font-size:13px;">
                ${c.approved_amount > 0 ? '$' + c.approved_amount.toLocaleString() : '—'}
            </td>
            <td>${scoreBar(c.fraud_score, true)}</td>
            <td>${scoreBar(c.final_score)}</td>
            <td>${getStatusBadge(c.status)}</td>
            <td style="font-size:12px; color:#718096;">${c.assessed_at ? new Date(c.assessed_at).toLocaleDateString() : '—'}</td>
            <td><a href="/claims/${c.id}/detail" class="btn btn-outline" style="font-size:12px; padding:4px 10px;">View</a></td>
        </tr>
    `).join('');
}

loadClaims();
</script>
{% endblock %}
